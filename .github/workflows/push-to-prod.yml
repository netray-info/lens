name: Push to prod

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Build and push Docker image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t ghcr.io/netray-info/lens:latest .
          docker push ghcr.io/netray-info/lens:latest

      - name: Trigger deployment webhook
        run: |
          PAYLOAD='{"ref":"prod"}'
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET_LENS }}" | sed 's/.*= //')
          curl -sf -X POST https://deploy.netray.info/hooks/deploy-lens \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
