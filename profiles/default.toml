[meta]
name = "default"
version = 2

[sections.dns]
weight = 20
hard_fail = []

[sections.dns.checks]
dnssec            = 5
caa               = 5
ns                = 3
ns_lame           = 5
ns_delegation     = 3
cname_apex        = 5
https_svcb        = 2
ttl               = 2
dnskey_algorithm  = 3
dnssec_rollover   = 2

[sections.tls]
weight = 35
hard_fail = ["chain_trusted", "not_expired"]

[sections.tls.checks]
chain_trusted = 10
not_expired = 10
hostname_match = 10
chain_complete = 5
strong_signature = 5
key_strength = 5
expiry_window = 5
cert_lifetime = 3
san_quality = 2
aia_reachability = 2
tls_version = 5
forward_secrecy = 5
aead_cipher = 5
ocsp_stapled = 3
ct_logged = 3
caa_compliant = 5
dane_valid = 3
consistency = 3
alpn_consistency = 2
ech_advertised = 2

[sections.http]
weight = 20
hard_fail = []

[sections.http.checks]
https_redirect   = 5
hsts             = 5
security_headers = 5
cors             = 3
cookie_secure    = 2
hygiene          = 2

[sections.email]
weight = 15
hard_fail = []

[sections.email.checks]
email_authentication = 10   # always scored; applies to every domain
email_infrastructure = 5    # N/A (Skip) when no MX records
email_transport      = 5    # N/A (Skip) when no MX records
email_brand_policy   = 2    # N/A (Skip) when no MX records

[sections.ip]
weight = 10
hard_fail = []

[sections.ip.checks]
reputation = 5

[thresholds]
"A+" = 97
"A"  = 90
"B"  = 75
"C"  = 60
"D"  = 40
"F"  = 0
