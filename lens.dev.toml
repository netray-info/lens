[server]
bind = "127.0.0.1:8082"
metrics_bind = "127.0.0.1:8090"

[backends]
dns_url = "https://dns.netray.info"
tls_url = "https://tls.netray.info"
ip_url  = "https://ip.netray.info"
backend_timeout_secs = 20

[cache]
enabled = false

[rate_limit]
per_ip_per_minute = 120
per_ip_burst = 30
global_per_minute = 500
global_burst = 100
