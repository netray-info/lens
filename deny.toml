[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "OpenSSL",
    "CDLA-Permissive-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"

[advisories]
ignore = [
    # paste is unmaintained (RUSTSEC-2024-0436); transitive dependency, no
    # drop-in replacement available yet. Tracked for future removal.
    "RUSTSEC-2024-0436",
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
